<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterwork - Home</title>

    <!-- Thư viện CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS của bạn (sử dụng ../ vì index.html đang ở trong folder pages) -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- Khối chứa Header sẽ được JavaScript đổ dữ liệu vào đây -->
    <div id="header-placeholder"></div>

    <!-- KHU VỰC NỘI DUNG CHÍNH (BODY) CỦA TRANG -->
    <!-- min-height: 60vh giúp tạo khoảng trống đẩy Footer xuống dưới khi chưa có nội dung -->
    <main style="min-height: 60vh;">
        
        <!-- Sau này bạn viết các section nội dung vào đây -->

    </main>

    <!-- Khối chứa Footer sẽ được JavaScript đổ dữ liệu vào đây -->
    <div id="footer-placeholder"></div>

    <!-- Thư viện JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Đoạn Script gọi Header và Footer -->
    <script>
        // Gọi file Header.html
        fetch('../components/Header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });

        // Gọi file Footer.html
        fetch('../components/Footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>
</body>
</html>
